databases:
  - name: poolrankings_production
    user: poolrankings
    plan: free

services:
  - type: web
    name: poolrankings
    runtime: ruby
    plan: starter
    buildCommand: './bin/render-build.sh'
    startCommand: 'bundle exec rails server'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: poolrankings_production
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: 2